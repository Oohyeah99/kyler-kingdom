<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Phonics Generator</title>
  <style>
    /* ============================================
       DESIGN SYSTEM TOKENS
       ============================================ */
    :root {
      --color-bg: #faf7f4;
      --color-bg-warm: #f5f0eb;
      --color-surface: #ffffff;
      --color-surface-hover: #fefcfa;
      --color-text: #2d2a26;
      --color-text-secondary: #7a746d;
      --color-text-muted: #a9a29a;
      --color-border: #e8e2db;
      --color-border-light: #f0ebe5;

      --color-onset: #5b8fd9;
      --color-onset-bg: #edf3fc;
      --color-onset-border: #c4d9f2;
      --color-vowel: #d4903a;
      --color-vowel-bg: #fdf3e7;
      --color-vowel-border: #f0d5a8;
      --color-coda: #9b7bd4;
      --color-coda-bg: #f3eefb;
      --color-coda-border: #d4c4ed;

      --color-green: #4caf7a;
      --color-green-bg: #edf7f0;
      --color-green-border: #b8e0c5;
      --color-yellow: #e0a832;
      --color-yellow-bg: #fdf6e3;
      --color-yellow-border: #f0d88a;
      --color-red: #d95b5b;
      --color-red-bg: #fceded;
      --color-red-border: #f0b8b8;

      --color-primary: #e07252;
      --color-primary-hover: #d4623f;
      --color-primary-active: #c45533;
      --color-primary-glow: rgba(224, 114, 82, 0.25);

      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;

      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      --text-xs: 12px;
      --text-sm: 13px;
      --text-base: 15px;
      --text-lg: 18px;
      --text-xl: 24px;
      --text-2xl: 36px;
      --text-3xl: 48px;
      --text-display: clamp(150px, 27vw, 270px);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 3px rgba(45, 42, 38, 0.06);
      --shadow-md: 0 4px 12px rgba(45, 42, 38, 0.08);
      --shadow-lg: 0 8px 30px rgba(45, 42, 38, 0.1);
      --shadow-xl: 0 16px 50px rgba(45, 42, 38, 0.12);
      --shadow-glow: 0 0 30px var(--color-primary-glow);

      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);

      --panel-width: 380px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: var(--text-base);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    button { font-family: inherit; cursor: pointer; border: none; background: none; font-size: inherit; color: inherit; }

    /* ============================================ HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid var(--color-border-light);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.85);
    }
    .header-left { display: flex; align-items: center; gap: var(--space-md); }
    .header-title { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.3px; }
    .header-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); }
    .header-actions { display: flex; align-items: center; gap: var(--space-sm); }

    /* ============================================ ICON BUTTONS */
    .icon-btn {
      width: 40px; height: 40px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-secondary); transition: var(--transition-fast); position: relative;
    }
    .icon-btn:hover { background: var(--color-bg-warm); color: var(--color-text); }
    .icon-btn.active { background: var(--color-primary); color: white; }
    .icon-btn svg { width: 20px; height: 20px; stroke-width: 1.8; }
    .badge {
      position: absolute; top: 4px; right: 4px; width: 8px; height: 8px;
      border-radius: var(--radius-full); background: var(--color-red); border: 2px solid var(--color-surface);
    }

    /* ============================================ PILLS */
    .pills {
      display: flex; align-items: center; gap: var(--space-xs);
      background: var(--color-bg-warm); padding: 3px; border-radius: var(--radius-full);
    }
    .pill {
      padding: 6px 16px; border-radius: var(--radius-full);
      font-size: var(--text-sm); font-weight: 500;
      color: var(--color-text-secondary); transition: var(--transition-fast);
    }
    .pill:hover { color: var(--color-text); }
    .pill.active { background: var(--color-surface); color: var(--color-text); box-shadow: var(--shadow-sm); }

    /* ============================================ PANELS */
    .panel-overlay {
      position: fixed; inset: 0; background: rgba(45, 42, 38, 0.2); z-index: 200;
      opacity: 0; pointer-events: none; transition: var(--transition-base); backdrop-filter: blur(2px);
    }
    .panel-overlay.open { opacity: 1; pointer-events: all; }
    .panel {
      position: fixed; top: 0; bottom: 0; width: var(--panel-width); max-width: 90vw;
      background: var(--color-surface); z-index: 300; display: flex; flex-direction: column;
      transition: var(--transition-slow); box-shadow: var(--shadow-xl);
    }
    .panel-left { left: 0; transform: translateX(-100%); border-right: 1px solid var(--color-border-light); }
    .panel-right { right: 0; transform: translateX(100%); border-left: 1px solid var(--color-border-light); }
    .panel.open { transform: translateX(0); }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-lg); border-bottom: 1px solid var(--color-border-light); flex-shrink: 0;
    }
    .panel-title { font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.3px; }
    .panel-body { flex: 1; overflow-y: auto; padding: var(--space-lg); }
    .panel-body::-webkit-scrollbar { width: 6px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: var(--radius-full); }

    /* ============================================ SOUND CHIPS */
    .chip-section { margin-bottom: var(--space-lg); }
    .chip-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
    .chip-section-title {
      font-size: var(--text-sm); font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; display: flex; align-items: center; gap: var(--space-sm);
    }
    .chip-section-title .dot { width: 8px; height: 8px; border-radius: var(--radius-full); }
    .chip-section-title .dot.onset { background: var(--color-onset); }
    .chip-section-title .dot.vowel { background: var(--color-vowel); }
    .chip-section-title .dot.coda { background: var(--color-coda); }
    .chip-section-actions { display: flex; gap: var(--space-xs); }
    .chip-action-btn {
      font-size: var(--text-xs); color: var(--color-text-muted);
      padding: 2px 8px; border-radius: var(--radius-sm); transition: var(--transition-fast);
    }
    .chip-action-btn:hover { background: var(--color-bg-warm); color: var(--color-text-secondary); }
    .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 5px 12px; border-radius: var(--radius-full); font-size: var(--text-sm); font-weight: 500;
      border: 1.5px solid var(--color-border); background: var(--color-surface);
      color: var(--color-text-secondary); transition: var(--transition-fast); user-select: none;
    }
    .chip:hover { background: var(--color-bg-warm); }
    .chip.active.onset { background: var(--color-onset-bg); border-color: var(--color-onset-border); color: var(--color-onset); }
    .chip.active.vowel { background: var(--color-vowel-bg); border-color: var(--color-vowel-border); color: var(--color-vowel); }
    .chip.active.coda { background: var(--color-coda-bg); border-color: var(--color-coda-border); color: var(--color-coda); }

    /* ============================================ MAIN CONTENT */
    .main {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: calc(100vh - 65px); padding: var(--space-2xl) var(--space-lg); position: relative;
    }
    .main::before {
      content: ''; position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 800px;
      background: radial-gradient(ellipse, var(--color-primary-glow) 0%, transparent 70%);
      pointer-events: none; opacity: 0.4;
    }
    .word-area { position: relative; z-index: 1; text-align: center; margin-bottom: var(--space-xl); }
    .word-label {
      font-size: var(--text-sm); color: var(--color-text-muted);
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; margin-bottom: var(--space-md);
    }

    /* Word display — scales down with more syllables */
    .word-display {
      font-weight: 500; letter-spacing: -3px; line-height: 1.1;
      margin-bottom: var(--space-md); min-height: 1.2em;
      display: flex; align-items: flex-start; justify-content: center; gap: 0;
      transition: var(--transition-base);
    }
    .word-display.syl-1 { font-size: var(--text-display); }
    .word-display.syl-2 { font-size: calc(var(--text-display) * 0.65); }
    .word-display.syl-3 { font-size: calc(var(--text-display) * 0.48); }
    .word-display.syl-4 { font-size: calc(var(--text-display) * 0.38); }

    .syllable-group { display: flex; align-items: flex-start; }

    /* Syllable separator */
    .syl-separator {
      width: 2px; align-self: stretch; margin: 8px 12px;
      background: var(--color-border); border-radius: 1px; opacity: 0;
      transition: var(--transition-fast);
    }
    .syl-separator.visible { opacity: 0.6; }

    .segment-col { display: flex; flex-direction: column; align-items: center; position: relative; }
    .word-segment { display: inline-block; }
    .word-segment.onset-seg { color: var(--color-onset); }
    .word-segment.vowel-seg { color: var(--color-vowel); }
    .word-segment.coda-seg { color: var(--color-coda); }
    .word-segment.blended { color: var(--color-text); }

    .word-segment.locked { position: relative; }
    .word-segment.locked::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; border-radius: 2px;
    }
    .word-segment.locked.onset-seg::after { background: var(--color-onset); opacity: 0.4; }
    .word-segment.locked.vowel-seg::after { background: var(--color-vowel); opacity: 0.4; }
    .word-segment.locked.coda-seg::after { background: var(--color-coda); opacity: 0.4; }

    .word-empty { color: var(--color-text-muted); font-weight: 400; font-size: var(--text-2xl); letter-spacing: 0; }

    /* Segment controls */
    .seg-controls { display: flex; align-items: center; gap: 4px; margin-top: 20px; opacity: 0; transition: var(--transition-fast); }
    .word-area:hover .seg-controls, .seg-controls.has-lock { opacity: 1; }

    .seg-controls-row { display: flex; align-items: center; justify-content: center; gap: var(--space-md); margin-top: 20px; }
    .seg-controls-row .seg-controls { margin-top: 0; }

    .seg-ctrl-dot { width: 6px; height: 6px; border-radius: var(--radius-full); flex-shrink: 0; }
    .seg-ctrl-dot.onset-dot { background: var(--color-onset); }
    .seg-ctrl-dot.vowel-dot { background: var(--color-vowel); }
    .seg-ctrl-dot.coda-dot { background: var(--color-coda); }

    .seg-ctrl-btn {
      width: 28px; height: 28px; border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-muted); transition: var(--transition-fast);
      background: var(--color-bg-warm); border: 1.5px solid transparent;
    }
    .seg-ctrl-btn:hover { background: var(--color-surface); border-color: var(--color-border); color: var(--color-text-secondary); }
    .seg-ctrl-btn svg { width: 13px; height: 13px; stroke-width: 2; }
    .seg-ctrl-btn.lock-btn.locked { background: var(--color-primary); color: white; border-color: var(--color-primary); }
    .seg-ctrl-btn.lock-btn.locked:hover { background: var(--color-primary-hover); }
    .seg-ctrl-btn.refresh-btn:hover.onset-ctrl { color: var(--color-onset); border-color: var(--color-onset-border); background: var(--color-onset-bg); }
    .seg-ctrl-btn.refresh-btn:hover.vowel-ctrl { color: var(--color-vowel); border-color: var(--color-vowel-border); background: var(--color-vowel-bg); }
    .seg-ctrl-btn.refresh-btn:hover.coda-ctrl { color: var(--color-coda); border-color: var(--color-coda-border); background: var(--color-coda-bg); }

    /* Toggles row */
    .toggles-row { display: flex; align-items: center; gap: var(--space-lg); justify-content: center; margin-bottom: var(--space-xl); flex-wrap: wrap; }
    .toggle-item { display: flex; align-items: center; gap: var(--space-sm); cursor: pointer; }
    .toggle-item span { font-size: var(--text-sm); color: var(--color-text-secondary); }
    .toggle { position: relative; width: 36px; height: 20px; background: var(--color-border); border-radius: var(--radius-full); cursor: pointer; transition: var(--transition-fast); flex-shrink: 0; }
    .toggle.on { background: var(--color-primary); }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: var(--radius-full); transition: var(--transition-fast); box-shadow: var(--shadow-sm); }
    .toggle.on::after { left: 18px; }

    /* ============================================ ACTION BUTTONS */
    .actions { display: flex; flex-direction: column; align-items: center; gap: var(--space-lg); position: relative; z-index: 1; }
    .primary-actions { display: flex; align-items: center; gap: var(--space-md); }
    .btn-generate {
      padding: 14px 40px; background: var(--color-primary); color: white;
      border-radius: var(--radius-full); font-size: var(--text-lg); font-weight: 700; letter-spacing: -0.3px;
      transition: var(--transition-base); box-shadow: 0 4px 16px var(--color-primary-glow);
    }
    .btn-generate:hover { background: var(--color-primary-hover); transform: translateY(-1px); box-shadow: 0 6px 24px var(--color-primary-glow); }
    .btn-generate:active { background: var(--color-primary-active); transform: translateY(0); }
    .btn-speak {
      width: 48px; height: 48px; border-radius: var(--radius-full);
      background: var(--color-surface); border: 1.5px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition-fast); color: var(--color-text-secondary);
    }
    .btn-speak:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .btn-speak:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-speak svg { width: 22px; height: 22px; }

    /* ============================================ RATING */
    .rating-section { display: flex; flex-direction: column; align-items: center; gap: var(--space-sm); }
    .rating-label { font-size: var(--text-sm); color: var(--color-text-muted); font-weight: 500; }
    .rating-buttons { display: flex; gap: var(--space-md); }
    .btn-rate {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 12px 24px; border-radius: var(--radius-lg); border: 1.5px solid transparent;
      transition: var(--transition-fast); font-weight: 600; font-size: var(--text-sm); min-width: 90px;
    }
    .btn-rate .rate-icon { font-size: 24px; line-height: 1; }
    .btn-rate.green { background: var(--color-green-bg); border-color: var(--color-green-border); color: var(--color-green); }
    .btn-rate.green:hover { background: var(--color-green); color: white; border-color: var(--color-green); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(76,175,122,0.3); }
    .btn-rate.yellow { background: var(--color-yellow-bg); border-color: var(--color-yellow-border); color: var(--color-yellow); }
    .btn-rate.yellow:hover { background: var(--color-yellow); color: white; border-color: var(--color-yellow); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(224,168,50,0.3); }
    .btn-rate.red { background: var(--color-red-bg); border-color: var(--color-red-border); color: var(--color-red); }
    .btn-rate.red:hover { background: var(--color-red); color: white; border-color: var(--color-red); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(217,91,91,0.3); }
    .btn-rate:disabled { opacity: 0.35; pointer-events: none; }

    /* ============================================ PROGRESS PANEL */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-sm); margin-bottom: var(--space-lg); }
    .stat-card { text-align: center; padding: var(--space-md); border-radius: var(--radius-md); background: var(--color-bg); }
    .stat-value { font-size: var(--text-xl); font-weight: 800; line-height: 1; margin-bottom: 2px; }
    .stat-label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .stat-card.green .stat-value { color: var(--color-green); }
    .stat-card.yellow .stat-value { color: var(--color-yellow); }
    .stat-card.red .stat-value { color: var(--color-red); }
    .adaptive-toggle { display: flex; align-items: center; justify-content: space-between; padding: var(--space-md); background: var(--color-bg); border-radius: var(--radius-md); margin-bottom: var(--space-lg); }
    .adaptive-info { display: flex; flex-direction: column; }
    .adaptive-title { font-size: var(--text-sm); font-weight: 600; }
    .adaptive-desc { font-size: var(--text-xs); color: var(--color-text-muted); }
    .struggling-section { margin-bottom: var(--space-lg); }
    .section-subtitle { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-secondary); margin-bottom: var(--space-sm); display: flex; align-items: center; gap: var(--space-sm); }
    .struggling-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .struggling-chip { padding: 4px 10px; border-radius: var(--radius-full); font-size: var(--text-sm); font-weight: 500; background: var(--color-red-bg); color: var(--color-red); border: 1px solid var(--color-red-border); }
    .history-section { margin-bottom: var(--space-md); }
    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item { display: flex; align-items: center; justify-content: space-between; padding: 10px var(--space-md); border-radius: var(--radius-md); background: var(--color-bg); transition: var(--transition-fast); }
    .history-item:hover { background: var(--color-bg-warm); }
    .history-word { font-weight: 700; font-size: var(--text-base); letter-spacing: -0.3px; }
    .history-meta { display: flex; align-items: center; gap: var(--space-sm); }
    .history-rating { width: 10px; height: 10px; border-radius: var(--radius-full); }
    .history-rating.green { background: var(--color-green); }
    .history-rating.yellow { background: var(--color-yellow); }
    .history-rating.red { background: var(--color-red); }
    .history-time { font-size: var(--text-xs); color: var(--color-text-muted); }
    .clear-btn { font-size: var(--text-xs); color: var(--color-text-muted); padding: 3px 10px; border-radius: var(--radius-sm); transition: var(--transition-fast); }
    .clear-btn:hover { background: var(--color-red-bg); color: var(--color-red); }
    .empty-state { text-align: center; padding: var(--space-2xl) var(--space-md); color: var(--color-text-muted); }
    .empty-state-icon { font-size: 48px; margin-bottom: var(--space-md); opacity: 0.4; }
    .empty-state-text { font-size: var(--text-sm); }

    /* ============================================ ANIMATIONS */
    @keyframes wordBounceIn { 0% { transform: scale(0.85) translateY(8px); } 60% { transform: scale(1.03) translateY(-3px); } 100% { transform: scale(1) translateY(0); } }
    .word-animate { animation: wordBounceIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes ratingPulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    .rating-pulse { animation: ratingPulse 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ============================================ TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px; border-radius: var(--radius-full);
      background: var(--color-text); color: var(--color-bg);
      font-size: var(--text-sm); font-weight: 500; z-index: 1000;
      opacity: 0; transition: var(--transition-slow); box-shadow: var(--shadow-lg); pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ============================================ RESPONSIVE */
    @media (max-width: 640px) {
      :root { --panel-width: 100%; --text-display: 96px; }
      .header { flex-wrap: wrap; gap: var(--space-sm); padding: var(--space-sm) var(--space-md); }
      .header .pills { order: 3; width: 100%; justify-content: center; }
      .rating-buttons { gap: var(--space-sm); }
      .btn-rate { padding: 10px 16px; min-width: 75px; }
      .btn-generate { padding: 12px 30px; font-size: var(--text-base); }
      .syl-separator { margin: 6px 6px; }
    }

    ::selection { background: var(--color-primary); color: white; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div>
        <div class="header-title">Pattern Phonics</div>
        <div class="header-subtitle">Sound it out</div>
      </div>
    </div>

    <div class="pills" id="difficultyPills">
      <button class="pill active" data-level="easy" onclick="setDifficulty('easy')">Easy</button>
      <button class="pill" data-level="medium" onclick="setDifficulty('medium')">Medium</button>
      <button class="pill" data-level="hard" onclick="setDifficulty('hard')">Hard</button>
    </div>

    <div class="header-actions">
      <button class="icon-btn" id="settingsBtn" onclick="togglePanel('settings')" title="Sound settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="icon-btn" id="progressBtn" onclick="togglePanel('progress')" title="Progress">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        <span class="badge" id="progressBadge" style="display:none;"></span>
      </button>
    </div>
  </header>

  <!-- SETTINGS PANEL -->
  <div class="panel-overlay" id="settingsOverlay" onclick="closeAllPanels()"></div>
  <aside class="panel panel-left" id="settingsPanel">
    <div class="panel-header">
      <span class="panel-title">Sounds</span>
      <button class="icon-btn" onclick="closeAllPanels()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="panel-body" id="settingsPanelBody"></div>
  </aside>

  <!-- PROGRESS PANEL -->
  <div class="panel-overlay" id="progressOverlay" onclick="closeAllPanels()"></div>
  <aside class="panel panel-right" id="progressPanel">
    <div class="panel-header">
      <span class="panel-title">Progress</span>
      <button class="icon-btn" onclick="closeAllPanels()"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="panel-body" id="progressPanelBody"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="word-area">
      <div class="word-label">Generated Word</div>
      <div class="word-display syl-1" id="wordDisplay">
        <span class="word-empty">Tap Generate to start</span>
      </div>

      <div class="toggles-row">
        <div class="pills" id="syllablePills">
          <button class="pill active" data-syl="1" onclick="setSyllableCount(1)">1</button>
          <button class="pill" data-syl="2" onclick="setSyllableCount(2)">2</button>
          <button class="pill" data-syl="3" onclick="setSyllableCount(3)">3</button>
          <button class="pill" data-syl="4" onclick="setSyllableCount(4)">4</button>
        </div>
        <span style="font-size:var(--text-sm);color:var(--color-text-muted);">syllables</span>

        <div class="toggle-item" onclick="toggleSegmentation()">
          <div class="toggle on" id="segmentToggle"></div>
          <span>Segments</span>
        </div>
        <div class="toggle-item" onclick="toggleSyllableSep()">
          <div class="toggle on" id="sylSepToggle"></div>
          <span>Dividers</span>
        </div>
      </div>
    </div>

    <div class="actions">
      <div class="primary-actions">
        <button class="btn-generate" onclick="generateWord()">Generate</button>
        <button class="btn-speak" id="speakBtn" onclick="speakWord()" disabled title="Hear pronunciation">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        </button>
      </div>
      <div class="rating-section">
        <div class="rating-label">How did it go?</div>
        <div class="rating-buttons">
          <button class="btn-rate green" onclick="rateWord('green')" disabled id="rateGreen"><span class="rate-icon">&#10004;</span>Easy</button>
          <button class="btn-rate yellow" onclick="rateWord('yellow')" disabled id="rateYellow"><span class="rate-icon">&#9711;</span>OK</button>
          <button class="btn-rate red" onclick="rateWord('red')" disabled id="rateRed"><span class="rate-icon">&#10008;</span>Hard</button>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    /* ============================================== DATA MODEL */
    const PHONICS_DATA = {
      onsets: {
        easy: ['b','c','d','f','g','h','j','k','l','m','n','p','r','s','t','v','w','z'],
        medium: ['bl','br','cl','cr','dr','fl','fr','gl','gr','pl','pr','sc','sk','sl','sm','sn','sp','st','sw','tr','tw'],
        hard: ['ch','ph','qu','sh','th','wh','wr','scr','shr','spl','spr','squ','str','thr']
      },
      vowels: {
        easy: ['a','e','i','o','u'],
        medium: ['ai','ay','ee','ea','ie','oa','oo','ou','ow','ue','ar','er','ir','or','ur'],
        hard: ['air','are','ear','eer','igh','ire','oor','ore','oi','oy','aw','au','ew','ure']
      },
      codas: {
        easy: ['b','d','g','k','l','m','n','p','s','t','x'],
        medium: ['ch','ck','ff','ll','nd','ng','nk','nt','mp','sh','ss','th','lk','lt','lp','ft','sk','sp','st'],
        hard: ['dge','tch','nch','ght','lth','nce','nge','nse','rch','rse','rth','sce']
      }
    };

    /* ============================================== STATE */
    let state = {
      difficulty: 'easy',
      syllableCount: 1,
      showSegments: true,
      showSylSep: true,
      adaptiveMode: false,
      currentWord: null,   // { syllables: [{ onset, vowel, coda }], full }
      activeOnsets: new Set(),
      activeVowels: new Set(),
      activeCodas: new Set(),
      history: [],
      wordRated: false,
      locks: [
        { onset: false, vowel: false, coda: false },
        { onset: false, vowel: false, coda: false },
        { onset: false, vowel: false, coda: false },
        { onset: false, vowel: false, coda: false }
      ]
    };

    /* ============================================== INIT */
    function init() {
      loadState();
      applyDifficulty(state.difficulty);
      renderSettingsPanel();
      renderProgressPanel();
      updateUI();
    }

    function loadState() {
      try {
        const saved = localStorage.getItem('phonics_state_v2');
        if (saved) {
          const p = JSON.parse(saved);
          state.difficulty = p.difficulty || 'easy';
          state.syllableCount = p.syllableCount || 1;
          state.showSegments = p.showSegments !== undefined ? p.showSegments : true;
          state.showSylSep = p.showSylSep !== undefined ? p.showSylSep : true;
          state.adaptiveMode = p.adaptiveMode || false;
          state.history = p.history || [];
          state.activeOnsets = new Set(p.activeOnsets || []);
          state.activeVowels = new Set(p.activeVowels || []);
          state.activeCodas = new Set(p.activeCodas || []);
          if (p.locks) state.locks = p.locks;
          if (state.activeOnsets.size === 0 && state.activeVowels.size === 0 && state.activeCodas.size === 0) {
            applyDifficulty(state.difficulty);
          }
        } else { applyDifficulty('easy'); }
      } catch (e) { applyDifficulty('easy'); }
    }

    function saveState() {
      try {
        localStorage.setItem('phonics_state_v2', JSON.stringify({
          difficulty: state.difficulty, syllableCount: state.syllableCount,
          showSegments: state.showSegments, showSylSep: state.showSylSep,
          adaptiveMode: state.adaptiveMode, history: state.history.slice(-500),
          activeOnsets: [...state.activeOnsets], activeVowels: [...state.activeVowels],
          activeCodas: [...state.activeCodas], locks: state.locks
        }));
      } catch (e) {}
    }

    /* ============================================== DIFFICULTY */
    function getSoundsForLevel(type, level) {
      const d = PHONICS_DATA[type];
      let s = [...d.easy];
      if (level === 'medium' || level === 'hard') s = s.concat(d.medium);
      if (level === 'hard') s = s.concat(d.hard);
      return s;
    }

    function applyDifficulty(level) {
      state.activeOnsets = new Set(getSoundsForLevel('onsets', level));
      state.activeVowels = new Set(getSoundsForLevel('vowels', level));
      state.activeCodas = new Set(getSoundsForLevel('codas', level));
    }

    function setDifficulty(level) {
      state.difficulty = level;
      applyDifficulty(level);
      document.querySelectorAll('#difficultyPills .pill').forEach(el => el.classList.toggle('active', el.dataset.level === level));
      renderSettingsPanel();
      saveState();
      showToast('Switched to ' + level.charAt(0).toUpperCase() + level.slice(1));
    }

    /* ============================================== SYLLABLE COUNT */
    function setSyllableCount(n) {
      state.syllableCount = n;
      document.querySelectorAll('#syllablePills .pill').forEach(el => el.classList.toggle('active', parseInt(el.dataset.syl) === n));
      // Reset locks for new syllable config
      state.locks = Array.from({ length: 4 }, (_, i) => state.locks[i] || { onset: false, vowel: false, coda: false });
      saveState();
      if (state.currentWord) {
        // Resize existing word or generate fresh
        generateWord();
      }
    }

    /* ============================================== GENERATION */
    function pickRandom(set) {
      const a = [...set]; return a.length ? a[Math.floor(Math.random() * a.length)] : '';
    }

    function getAdaptiveBias() {
      if (!state.adaptiveMode || state.history.length < 3) return null;
      const reds = state.history.filter(h => h.rating === 'red');
      const yellows = state.history.filter(h => h.rating === 'yellow');
      if (!reds.length && !yellows.length) return null;
      const oc = {}, vc = {}, cc = {};
      const extract = (entry) => {
        const syls = entry.syllables || [{ onset: entry.onset, vowel: entry.vowel, coda: entry.coda }];
        syls.forEach(s => {
          if (s.onset) oc[s.onset] = (oc[s.onset] || 0) + 1;
          if (s.vowel) vc[s.vowel] = (vc[s.vowel] || 0) + 1;
          if (s.coda) cc[s.coda] = (cc[s.coda] || 0) + 1;
        });
      };
      [...reds, ...reds, ...yellows].forEach(extract);
      return { onsetCounts: oc, vowelCounts: vc, codaCounts: cc };
    }

    function weightedPick(set, counts) {
      if (!counts) return pickRandom(set);
      const a = [...set]; if (!a.length) return '';
      const w = [];
      a.forEach(s => { const wt = (counts[s] || 0) + 1; for (let i = 0; i < wt; i++) w.push(s); });
      return w[Math.floor(Math.random() * w.length)];
    }

    function pickSound(type, bias) {
      const setMap = { onset: state.activeOnsets, vowel: state.activeVowels, coda: state.activeCodas };
      const countMap = { onset: 'onsetCounts', vowel: 'vowelCounts', coda: 'codaCounts' };
      return bias ? weightedPick(setMap[type], bias[countMap[type]]) : pickRandom(setMap[type]);
    }

    function generateSyllable(index, total, bias) {
      const isFirst = index === 0;
      const isLast = index === total - 1;
      const isSingle = total === 1;

      let onset = '', vowel = '', coda = '';

      // Vowel is always present
      vowel = (state.locks[index].vowel && state.currentWord && state.currentWord.syllables[index])
        ? state.currentWord.syllables[index].vowel
        : pickSound('vowel', bias);

      if (isSingle) {
        // Single syllable: always all 3 parts
        onset = (state.locks[index].onset && state.currentWord && state.currentWord.syllables[index])
          ? state.currentWord.syllables[index].onset
          : pickSound('onset', bias);
        coda = (state.locks[index].coda && state.currentWord && state.currentWord.syllables[index])
          ? state.currentWord.syllables[index].coda
          : pickSound('coda', bias);
      } else {
        // Multi-syllable: allow partial
        // Onset
        if (state.locks[index].onset && state.currentWord && state.currentWord.syllables[index]) {
          onset = state.currentWord.syllables[index].onset;
        } else if (isFirst || Math.random() < 0.7) {
          onset = pickSound('onset', bias);
        }
        // Coda
        if (state.locks[index].coda && state.currentWord && state.currentWord.syllables[index]) {
          coda = state.currentWord.syllables[index].coda;
        } else if (isLast || Math.random() < 0.7) {
          coda = pickSound('coda', bias);
        }
      }

      return { onset, vowel, coda };
    }

    function generateWord() {
      if (!state.activeOnsets.size || !state.activeVowels.size || !state.activeCodas.size) {
        showToast('Select at least one sound in each column');
        togglePanel('settings');
        return;
      }
      const bias = getAdaptiveBias();
      const syllables = [];
      for (let i = 0; i < state.syllableCount; i++) {
        syllables.push(generateSyllable(i, state.syllableCount, bias));
      }
      const full = syllables.map(s => s.onset + s.vowel + s.coda).join('');
      state.currentWord = { syllables, full };
      state.wordRated = false;
      renderWordDisplay();
      enableRatingButtons(true);
      document.getElementById('speakBtn').disabled = false;
    }

    /* ============================================== LOCK & REFRESH */
    function toggleLock(sylIdx, segment) {
      state.locks[sylIdx][segment] = !state.locks[sylIdx][segment];
      renderWordDisplay();
      saveState();
      if (state.locks[sylIdx][segment]) {
        const label = state.syllableCount > 1 ? `Syl ${sylIdx + 1} ${segment}` : segment.charAt(0).toUpperCase() + segment.slice(1);
        showToast(label + ' locked');
      }
    }

    function refreshSegment(sylIdx, segment) {
      if (!state.currentWord || !state.currentWord.syllables[sylIdx]) return;
      const bias = getAdaptiveBias();
      state.currentWord.syllables[sylIdx][segment] = pickSound(segment, bias);
      state.currentWord.full = state.currentWord.syllables.map(s => s.onset + s.vowel + s.coda).join('');
      state.wordRated = false;
      enableRatingButtons(true);
      renderWordDisplay();
    }

    function hasAnyLock() {
      for (let i = 0; i < state.syllableCount; i++) {
        if (state.locks[i].onset || state.locks[i].vowel || state.locks[i].coda) return true;
      }
      return false;
    }

    /* ============================================== RENDER WORD */
    const lockSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
    const unlockSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>';
    const refreshSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>';

    function buildCtrl(sylIdx, segment, segClass, showLabel) {
      const isLocked = state.locks[sylIdx][segment];
      const hl = hasAnyLock();
      const labels = { onset: 'Start', vowel: 'Mid', coda: 'End' };
      const lbl = showLabel ? `<span class="seg-ctrl-dot ${segClass}-dot"></span>` : '';
      return `<div class="seg-controls ${hl ? 'has-lock' : ''}">${lbl}<button class="seg-ctrl-btn lock-btn ${isLocked ? 'locked' : ''}" onclick="event.stopPropagation();toggleLock(${sylIdx},'${segment}')" title="${isLocked ? 'Unlock' : 'Lock'}">${isLocked ? lockSvg : unlockSvg}</button><button class="seg-ctrl-btn refresh-btn ${segClass}-ctrl" onclick="event.stopPropagation();refreshSegment(${sylIdx},'${segment}')" title="Refresh">${refreshSvg}</button></div>`;
    }

    function renderWordDisplay() {
      const display = document.getElementById('wordDisplay');
      display.className = 'word-display syl-' + state.syllableCount;

      if (!state.currentWord) {
        display.innerHTML = '<span class="word-empty">Tap Generate to start</span>';
        return;
      }

      const syls = state.currentWord.syllables;
      let html = '';

      if (state.showSegments) {
        syls.forEach((s, si) => {
          if (si > 0) html += `<div class="syl-separator ${state.showSylSep ? 'visible' : ''}"></div>`;
          html += '<div class="syllable-group">';
          if (s.onset) html += `<div class="segment-col"><span class="word-segment onset-seg ${state.locks[si].onset ? 'locked' : ''}">${s.onset}</span>${buildCtrl(si, 'onset', 'onset', false)}</div>`;
          html += `<div class="segment-col"><span class="word-segment vowel-seg ${state.locks[si].vowel ? 'locked' : ''}">${s.vowel}</span>${buildCtrl(si, 'vowel', 'vowel', false)}</div>`;
          if (s.coda) html += `<div class="segment-col"><span class="word-segment coda-seg ${state.locks[si].coda ? 'locked' : ''}">${s.coda}</span>${buildCtrl(si, 'coda', 'coda', false)}</div>`;
          html += '</div>';
        });
      } else {
        // Blended mode
        const blendedParts = [];
        syls.forEach((s, si) => {
          if (si > 0 && state.showSylSep) blendedParts.push(`<span style="color:var(--color-border);font-weight:300;margin:0 2px;">|</span>`);
          blendedParts.push(s.onset + s.vowel + s.coda);
        });
        html += `<div class="segment-col"><span class="word-segment blended">${blendedParts.join('')}</span>`;
        html += '<div class="seg-controls-row">';
        syls.forEach((s, si) => {
          if (si > 0) html += '<div style="width:1px;height:24px;background:var(--color-border);margin:0 4px;border-radius:1px;"></div>';
          if (s.onset) html += buildCtrl(si, 'onset', 'onset', true);
          html += buildCtrl(si, 'vowel', 'vowel', true);
          if (s.coda) html += buildCtrl(si, 'coda', 'coda', true);
        });
        html += '</div></div>';
      }

      display.innerHTML = html;
      display.classList.remove('word-animate');
      void display.offsetWidth;
      display.classList.add('word-animate');
    }

    /* ============================================== TOGGLES */
    function toggleSegmentation() {
      state.showSegments = !state.showSegments;
      document.getElementById('segmentToggle').classList.toggle('on', state.showSegments);
      renderWordDisplay(); saveState();
    }

    function toggleSyllableSep() {
      state.showSylSep = !state.showSylSep;
      document.getElementById('sylSepToggle').classList.toggle('on', state.showSylSep);
      renderWordDisplay(); saveState();
    }

    /* ============================================== TTS */
    function speakWord() {
      if (!state.currentWord) return;
      const u = new SpeechSynthesisUtterance(state.currentWord.full);
      u.rate = 0.8; u.pitch = 1.0; u.lang = 'en-GB';
      const voices = speechSynthesis.getVoices();
      const v = voices.find(v => v.lang === 'en-GB') || voices.find(v => v.lang.startsWith('en'));
      if (v) u.voice = v;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => {};

    /* ============================================== RATING */
    function rateWord(rating) {
      if (!state.currentWord || state.wordRated) return;
      state.wordRated = true;
      const entry = {
        word: state.currentWord.full,
        syllables: state.currentWord.syllables,
        rating, timestamp: Date.now()
      };
      state.history.unshift(entry);
      const btn = document.getElementById('rate' + rating.charAt(0).toUpperCase() + rating.slice(1));
      btn.classList.add('rating-pulse');
      setTimeout(() => btn.classList.remove('rating-pulse'), 300);
      renderProgressPanel(); saveState();
      document.getElementById('progressBadge').style.display = 'block';
      setTimeout(() => generateWord(), 600);
    }

    function enableRatingButtons(enabled) {
      document.getElementById('rateGreen').disabled = !enabled;
      document.getElementById('rateYellow').disabled = !enabled;
      document.getElementById('rateRed').disabled = !enabled;
    }

    /* ============================================== SETTINGS PANEL */
    function renderSettingsPanel() {
      const body = document.getElementById('settingsPanelBody');
      const sections = [
        { key: 'onsets', title: 'Beginning Sounds', dot: 'onset', chip: 'onset', set: state.activeOnsets },
        { key: 'vowels', title: 'Vowel Sounds', dot: 'vowel', chip: 'vowel', set: state.activeVowels },
        { key: 'codas', title: 'Ending Sounds', dot: 'coda', chip: 'coda', set: state.activeCodas }
      ];
      let h = '';
      sections.forEach(sec => {
        const all = getSoundsForLevel(sec.key, 'hard');
        h += `<div class="chip-section"><div class="chip-section-header"><div class="chip-section-title"><span class="dot ${sec.dot}"></span>${sec.title}<span style="font-weight:400;color:var(--color-text-muted);font-size:var(--text-xs);">(${sec.set.size}/${all.length})</span></div><div class="chip-section-actions"><button class="chip-action-btn" onclick="selectAll('${sec.key}')">All</button><button class="chip-action-btn" onclick="deselectAll('${sec.key}')">None</button></div></div><div class="chip-grid">`;
        all.forEach(s => {
          h += `<button class="chip ${sec.set.has(s) ? 'active' : ''} ${sec.chip}" onclick="toggleSound('${sec.key}','${s}',this)">${s}</button>`;
        });
        h += '</div></div>';
      });
      body.innerHTML = h;
    }

    function toggleSound(type, sound, el) {
      const m = { onsets: state.activeOnsets, vowels: state.activeVowels, codas: state.activeCodas };
      m[type].has(sound) ? m[type].delete(sound) : m[type].add(sound);
      renderSettingsPanel(); saveState();
    }
    function selectAll(type) {
      const m = { onsets: state.activeOnsets, vowels: state.activeVowels, codas: state.activeCodas };
      getSoundsForLevel(type, 'hard').forEach(s => m[type].add(s));
      renderSettingsPanel(); saveState();
    }
    function deselectAll(type) {
      const m = { onsets: state.activeOnsets, vowels: state.activeVowels, codas: state.activeCodas };
      m[type].clear(); renderSettingsPanel(); saveState();
    }

    /* ============================================== PROGRESS PANEL */
    function renderProgressPanel() {
      const body = document.getElementById('progressPanelBody');
      const total = state.history.length;
      const g = state.history.filter(h => h.rating === 'green').length;
      const y = state.history.filter(h => h.rating === 'yellow').length;
      const r = state.history.filter(h => h.rating === 'red').length;
      const struggling = getStrugglingPatterns();
      let h = `<div class="stats-grid"><div class="stat-card green"><div class="stat-value">${g}</div><div class="stat-label">Easy</div></div><div class="stat-card yellow"><div class="stat-value">${y}</div><div class="stat-label">OK</div></div><div class="stat-card red"><div class="stat-value">${r}</div><div class="stat-label">Hard</div></div></div>`;
      h += `<div class="adaptive-toggle"><div class="adaptive-info"><span class="adaptive-title">Adaptive Mode</span><span class="adaptive-desc">Prioritise struggling sounds</span></div><div class="toggle ${state.adaptiveMode ? 'on' : ''}" onclick="toggleAdaptive()"></div></div>`;
      if (struggling.length) {
        h += `<div class="struggling-section"><div class="section-subtitle"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Needs Practice</div><div class="struggling-list">${struggling.map(p => `<span class="struggling-chip">${p.sound} (${p.count})</span>`).join('')}</div></div>`;
      }
      h += `<div class="history-section"><div class="history-header"><div class="section-subtitle">Session History (${total})</div>${total ? '<button class="clear-btn" onclick="clearHistory()">Clear</button>' : ''}</div>`;
      if (!total) {
        h += '<div class="empty-state"><div class="empty-state-icon">&#128218;</div><div class="empty-state-text">Generate some words to see your progress here</div></div>';
      } else {
        h += '<div class="history-list">';
        state.history.slice(0, 50).forEach((e, i) => {
          const t = new Date(e.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          h += `<div class="history-item" style="animation:slideUp 0.2s ease ${i * 0.02}s both;"><span class="history-word">${e.word}</span><div class="history-meta"><span class="history-time">${t}</span><span class="history-rating ${e.rating}"></span></div></div>`;
        });
        h += '</div>';
      }
      h += '</div>';
      body.innerHTML = h;
    }

    function getStrugglingPatterns() {
      const sc = {};
      const extract = (entry, weight) => {
        const syls = entry.syllables || [{ onset: entry.onset, vowel: entry.vowel, coda: entry.coda }];
        syls.forEach(s => {
          if (s.onset) sc[s.onset] = (sc[s.onset] || 0) + weight;
          if (s.vowel) sc[s.vowel] = (sc[s.vowel] || 0) + weight;
          if (s.coda) sc[s.coda] = (sc[s.coda] || 0) + weight;
        });
      };
      state.history.filter(h => h.rating === 'red').forEach(e => extract(e, 1));
      state.history.filter(h => h.rating === 'yellow').forEach(e => extract(e, 0.5));
      return Object.entries(sc).filter(([_, c]) => c >= 1.5).sort((a, b) => b[1] - a[1]).slice(0, 12).map(([s, c]) => ({ sound: s, count: Math.round(c) }));
    }

    function toggleAdaptive() {
      state.adaptiveMode = !state.adaptiveMode;
      renderProgressPanel(); saveState();
      showToast(state.adaptiveMode ? 'Adaptive mode on' : 'Adaptive mode off');
    }
    function clearHistory() {
      if (confirm('Clear all history?')) { state.history = []; renderProgressPanel(); saveState(); showToast('History cleared'); }
    }

    /* ============================================== PANELS */
    function togglePanel(panel) {
      const sp = document.getElementById('settingsPanel'), so = document.getElementById('settingsOverlay');
      const pp = document.getElementById('progressPanel'), po = document.getElementById('progressOverlay');
      if (panel === 'settings') {
        const open = sp.classList.contains('open'); closeAllPanels();
        if (!open) { sp.classList.add('open'); so.classList.add('open'); document.getElementById('settingsBtn').classList.add('active'); }
      } else {
        const open = pp.classList.contains('open'); closeAllPanels();
        if (!open) { pp.classList.add('open'); po.classList.add('open'); document.getElementById('progressBtn').classList.add('active'); document.getElementById('progressBadge').style.display = 'none'; }
      }
    }
    function closeAllPanels() {
      ['settingsPanel','settingsOverlay','progressPanel','progressOverlay'].forEach(id => document.getElementById(id).classList.remove('open'));
      ['settingsBtn','progressBtn'].forEach(id => document.getElementById(id).classList.remove('active'));
    }

    /* ============================================== TOAST */
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    /* ============================================== UI UPDATE */
    function updateUI() {
      document.querySelectorAll('#difficultyPills .pill').forEach(el => el.classList.toggle('active', el.dataset.level === state.difficulty));
      document.querySelectorAll('#syllablePills .pill').forEach(el => el.classList.toggle('active', parseInt(el.dataset.syl) === state.syllableCount));
      document.getElementById('segmentToggle').classList.toggle('on', state.showSegments);
      document.getElementById('sylSepToggle').classList.toggle('on', state.showSylSep);
      renderWordDisplay();
    }

    /* ============================================== KEYBOARD */
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (state.currentWord && !state.wordRated) return; generateWord(); }
      if (e.key === '1' && state.currentWord && !state.wordRated) rateWord('green');
      if (e.key === '2' && state.currentWord && !state.wordRated) rateWord('yellow');
      if (e.key === '3' && state.currentWord && !state.wordRated) rateWord('red');
      if ((e.key === 's' || e.key === 'S') && state.currentWord) speakWord();
      if (e.key === 'Escape') closeAllPanels();
    });

    /* ============================================== GO */
    init();
  </script>
</body>
</html>
